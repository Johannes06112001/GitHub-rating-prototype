name: Collect GitHub Data

on:
  workflow_dispatch:          # manuell auslösbar
  schedule:
    - cron: '0 3 * * 0'       # jeden Sonntag 03:00 Uhr automatisch

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # ← WICHTIG: ohne das kein Commit möglich

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Daten sammeln
        env:
          GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN }}   # ← dein eigener Token (s.u.)
        run: python collect_data.py

      - name: Ergebnisse ins Repo committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add top100_repos.json benchmarks.json analysis_report.md
          git diff --staged --quiet || git commit -m "chore: update repo data [$(date -u '+%Y-%m-%d')]"
          git push
